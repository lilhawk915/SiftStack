name: Ohio Daily Scrape (ARCHIVED — CANNOT PASS reCAPTCHA v3)

# ⚠️ ARCHIVED 2026-07-05 — cron schedule disabled.
#
# pro.mcohio.org deployed reCAPTCHA v3 + IP-based proxy detection on
# 2026-07-01. GitHub Actions' IP ranges are on Google's low-trust list
# and cannot mint a v3 token with a high enough score to bypass the
# portal's threshold. Every scheduled run since 2026-07-01 has failed
# with RecaptchaBlockedError and spammed the ftm channel.
#
# Production daily runs now happen on Ryan's local Mac via launchd
# cron (~/Library/LaunchAgents/com.siftstack.ohio-daily.plist), which
# uses Chrome CDP off-screen against a residential IP to organically
# score high on v3. See scripts/run_ohio_daily_via_chrome.sh and
# docs/VA_DAILY_WORKFLOW.md for the current workflow.
#
# The workflow file is kept (not deleted) so `workflow_dispatch`
# manual runs remain available for one-off cloud tests — e.g.,
# validating a code change without touching the Mac. Manual runs
# WILL fail at the FC scrape step unless the reCAPTCHA situation
# changes or a residential proxy is added.
on:
  # schedule DISABLED 2026-07-05 — see comment above.
  #  schedule:
  #    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      date_from:
        description: 'ISO date (YYYY-MM-DD) — override lookback start'
        required: false
        default: ''
      date_to:
        description: 'ISO date (YYYY-MM-DD) — override lookback end'
        required: false
        default: ''
      max_cases:
        description: 'Per-source case cap (0 = no cap)'
        required: false
        default: '0'

concurrency:
  # Only one daily run at a time. If a manual run is triggered while
  # the scheduled one is executing, the newer run cancels the older.
  group: ohio-daily
  cancel-in-progress: false

jobs:
  run-daily:
    name: Montgomery daily
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            playwright-chromium-

      - name: Install Chromium (if cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps

      - name: Restore sheriff-sale state file
        # Sheriff dedup filter (commit 926b4d6) tracks emitted case#s
        # in output/.seen_sheriff_cases.json so daily runs don't
        # re-ship the same upcoming auctions. Ephemeral runners lose
        # this between runs — cache preserves it across runs.
        # Cache key = run_id makes each save unique; restore-keys
        # matches the most recent prior cache.
        uses: actions/cache@v4
        with:
          path: output/.seen_sheriff_cases.json
          key: sheriff-state-${{ github.run_id }}
          restore-keys: |
            sheriff-state-

      - name: Run Ohio daily orchestrator
        id: scrape
        env:
          CAPTCHA_API_KEY: ${{ secrets.CAPTCHA_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMARTY_AUTH_ID: ${{ secrets.SMARTY_AUTH_ID }}
          SMARTY_AUTH_TOKEN: ${{ secrets.SMARTY_AUTH_TOKEN }}
          TRACERFY_API_KEY: ${{ secrets.TRACERFY_API_KEY }}
          TRESTLE_API_KEY: ${{ secrets.TRESTLE_API_KEY }}
          DATASIFT_EMAIL: ${{ secrets.DATASIFT_EMAIL }}
          DATASIFT_PASSWORD: ${{ secrets.DATASIFT_PASSWORD }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PRO_MCOHIO_RECAPTCHA_V3_SITEKEY: ${{ vars.PRO_MCOHIO_RECAPTCHA_V3_SITEKEY || '6LcIVYQcAAAAAB3UDYAT2rh-EelDlT7i48-tTvhv' }}
          PRO_MCOHIO_RECAPTCHA_V3_ACTION: ${{ vars.PRO_MCOHIO_RECAPTCHA_V3_ACTION || 'submit' }}
          PRO_MCOHIO_RECAPTCHA_V3_MIN_SCORE: ${{ vars.PRO_MCOHIO_RECAPTCHA_V3_MIN_SCORE || '0.3' }}
          ONBASE_ENABLED: '1'
          TRACERFY_ENABLED: '1'
          TRESTLE_ENABLED: '1'
          SHERIFF_NEW_ONLY: '1'
          ONBASE_DAILY_COST_CAP_USD: '10'
          TRACERFY_DAILY_COST_CAP_USD: '2'
          TRESTLE_DAILY_COST_CAP_USD: '1'
          PYTHONPATH: src
        run: |
          # Build args from workflow_dispatch inputs, if provided.
          ARGS=""
          if [ -n "${{ github.event.inputs.date_from }}" ]; then
            ARGS="$ARGS --date-from ${{ github.event.inputs.date_from }}"
          fi
          if [ -n "${{ github.event.inputs.date_to }}" ]; then
            ARGS="$ARGS --date-to ${{ github.event.inputs.date_to }}"
          fi
          if [ "${{ github.event.inputs.max_cases }}" != "0" ] && [ -n "${{ github.event.inputs.max_cases }}" ]; then
            ARGS="$ARGS --max-cases ${{ github.event.inputs.max_cases }}"
          fi
          echo "Running: python -u src/ohio_orchestrator.py daily $ARGS"
          # Tee to a file so post-run health check can grep it
          python -u src/ohio_orchestrator.py daily $ARGS 2>&1 | tee /tmp/orchestrator.log

      - name: Health check — flag caught-but-not-raised failures
        # The orchestrator catches OnBase / reCAPTCHA / Slack failures
        # internally and exits 0 even when data is missing. This step
        # promotes those to workflow failures so the Slack notification
        # actually fires. Grep patterns:
        #   - "RecaptchaBlockedError" — FC scrape hit the v3 block
        #   - "OnBase enrichment FAILED" — probate PDFs never processed
        #   - "Slack post failed" — the internal Slack push crashed
        #   - "0 total records" or "records': 0" — nothing scraped at all
        run: |
          FAILED=0
          if grep -qE "RecaptchaBlockedError|OnBase enrichment FAILED|Slack post failed" /tmp/orchestrator.log; then
            echo "::warning::Caught-but-not-raised failure in orchestrator log"
            grep -E "RecaptchaBlockedError|OnBase enrichment FAILED|Slack post failed|Montgomery.*→ [0-9]+ records" /tmp/orchestrator.log | head -20
            FAILED=1
          fi
          if grep -qE "'records': 0" /tmp/orchestrator.log; then
            echo "::error::Orchestrator emitted 0 records"
            FAILED=1
          fi
          exit $FAILED

      - name: Upload CSV + logs as workflow artifacts
        # Runs even on failure so you can debug what happened.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ohio-daily-${{ github.run_id }}
          path: |
            output/OH_Montgomery_daily_*.csv
            logs/*.log
            logs/*.err
          retention-days: 30
          if-no-files-found: warn

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$SLACK_BOT_TOKEN" ]; then
            echo "SLACK_BOT_TOKEN not set — skipping failure notification"
            exit 0
          fi
          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-type: application/json; charset=utf-8" \
            --data @- <<EOF
          {
            "channel": "#h3-homebuyers-ftm",
            "text": ":x: *SiftStack daily FAILED* — GitHub Actions run: <$RUN_URL|view logs>. If the failure is 'reCAPTCHA blocked' (BUG-04), the portal blocked GH Actions' IP. Options: bump PRO_MCOHIO_RECAPTCHA_V3_MIN_SCORE variable, capture the real action string from Chrome DevTools, or add a residential proxy."
          }
          EOF
